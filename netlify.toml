[build]
  publish = "."

# Send all traffic to the single portal file
[[redirects]]
  from = "/"
  to = "/pezzano-portal-COMPLETE.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/pezzano-portal-COMPLETE.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; frame-src https://www.youtube-nocookie.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:"
