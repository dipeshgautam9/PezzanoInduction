<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pezzano Induction Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f1117;--surface:#181c25;--surface2:#1e2330;--surface3:#242938;
  --border:#2a2f3d;--primary:#00b4d8;--success:#4ade80;--warning:#fbbf24;
  --error:#f87171;--text:#e8eaf0;--muted:#8b92a5;--faint:#4a5068;
  --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
/* HEADER */
.app-header{position:sticky;top:0;z-index:40;background:rgba(15,17,23,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px}
.header-inner{max-width:1400px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.logo-sm{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#00b4d8,#0077a8);display:grid;place-items:center;font-size:.85rem;font-weight:800;color:#fff}
.brand-name{font-size:.98rem;font-weight:600}
.brand-sub{font-size:.72rem;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.user-chip{display:flex;align-items:center;gap:7px;padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:.78rem}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--success)}
/* PAGE */
.page{max-width:1400px;margin:0 auto;padding:24px}
/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.card-title{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:12px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:none;border-radius:8px;font-size:.82rem;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{opacity:.85;transform:translateY(-1px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--primary);color:#111}
.btn-success{background:rgba(74,222,128,.15);color:var(--success);border:1px solid rgba(74,222,128,.2)}
.btn-warn{background:rgba(251,191,36,.12);color:var(--warning);border:1px solid rgba(251,191,36,.2)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--error);border:1px solid rgba(248,113,113,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 20% 50%,rgba(0,180,216,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,222,128,.04) 0%,transparent 50%)}
.login-box{width:100%;max-width:420px}
.logo-row{text-align:center;margin-bottom:28px}
.logo-big{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#00b4d8,#0077a8);font-size:1.4rem;font-weight:800;color:#fff;margin-bottom:12px}
.logo-row h1{font-size:1.3rem;font-weight:600}
.logo-row p{font-size:.82rem;color:var(--muted);margin-top:3px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px}
.tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:8px;border:none;border-radius:7px;background:none;color:var(--muted);font-size:.85rem;font-weight:500;cursor:pointer;transition:.18s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.panel{display:none}.panel.active{display:block}
.field{margin-bottom:16px}
.field label{display:block;font-size:.75rem;font-weight:500;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field select{width:100%;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:.92rem;outline:none;transition:.18s;font-family:var(--font)}
.field input:focus,.field select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,180,216,.12)}
.field input[readonly]{opacity:.5;cursor:not-allowed}
.login-btn{width:100%;padding:12px;border:none;border-radius:9px;font-size:.95rem;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--primary),#0077a8);color:#fff;transition:.18s;margin-top:4px;font-family:var(--font)}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-btn:disabled{opacity:.5;transform:none;cursor:not-allowed}
.msg{padding:10px 14px;border-radius:8px;font-size:.83rem;margin-top:12px;display:none}
.msg.error{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:var(--error)}
.msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:var(--success)}
.hint{font-size:.75rem;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{padding:18px 20px}
.metric .val{font-size:1.9rem;font-weight:700;letter-spacing:-.03em;line-height:1}
.metric .lbl{font-size:.75rem;color:var(--muted);margin-top:4px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:600}
.badge-pending{background:rgba(139,146,165,.12);color:var(--muted)}
.badge-progress{background:rgba(251,191,36,.12);color:var(--warning)}
.badge-completed{background:rgba(74,222,128,.12);color:var(--success)}
/* TABLE */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-top:14px}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{padding:10px 12px;background:var(--surface2);color:var(--muted);font-weight:500;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
.actions-cell{display:flex;gap:5px;flex-wrap:wrap}
/* PROGRESS */
.prog-bar{height:5px;background:var(--surface3);border-radius:999px;overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-right:6px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--success))}
/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.filters input,.filters select{padding:7px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.82rem;outline:none;font-family:var(--font)}
.filters input:focus,.filters select:focus{border-color:var(--primary)}
/* MODAL */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal h3{font-size:1.05rem;margin-bottom:16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:#1a2535;border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:.83rem;z-index:200;opacity:0;transform:translateY(8px);transition:.3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
/* KNOWLEDGE & MODULES */
.kb-grid{display:grid;grid-template-columns:220px 1fr;gap:16px}
.kb-nav{display:grid;gap:6px}
.kb-btn{padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;text-align:left;cursor:pointer;transition:.15s;font-size:.82rem;color:var(--text);font-family:var(--font)}
.kb-btn:hover{border-color:var(--primary)}
.kb-btn.active{background:rgba(0,180,216,.1);border-color:var(--primary);color:var(--primary)}
.kb-btn.done{background:rgba(74,222,128,.07);border-color:rgba(74,222,128,.25);color:var(--success)}
.module-list{display:grid;gap:6px}
.mod-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;font-size:.83rem;cursor:pointer;transition:.15s}
.mod-row:hover{border-color:var(--primary)}
.mod-row.active{border-color:var(--primary);background:rgba(0,180,216,.07)}
.mod-row.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.05)}
.mod-row.locked{opacity:.4;cursor:not-allowed}
/* QUIZ */
.q-text{font-size:.95rem;font-weight:500;margin-bottom:16px;line-height:1.5}
.options{display:grid;gap:8px}
.opt{padding:11px 14px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;text-align:left;cursor:pointer;font-size:.85rem;transition:.15s;color:var(--text);font-family:var(--font)}
.opt:hover:not(:disabled){border-color:var(--primary)}
.opt.correct{border-color:var(--success);background:rgba(74,222,128,.1);color:var(--success);font-weight:600}
.opt.wrong{border-color:var(--error);background:rgba(248,113,113,.1);color:var(--error)}
.feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.83rem;display:none}
.feedback.show{display:block}
.feedback.good{background:rgba(74,222,128,.1);color:var(--success)}
.feedback.bad{background:rgba(248,113,113,.1);color:var(--error)}
.explain{background:rgba(251,191,36,.08);color:var(--warning);margin-top:8px;padding:10px 14px;border-radius:8px;font-size:.82rem;display:none}
.explain.show{display:block}
/* LETTER PRINT */
@media print{
  @page{margin:0;size:A4 portrait}
  html,body{margin:0;padding:0;overflow:hidden}
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{position:fixed;left:0;top:0;width:210mm;height:297mm;background:#fff;overflow:hidden;display:block!important}
}
.letter{background:#fff;color:#222;padding:14mm 18mm;width:210mm;max-height:297mm;box-sizing:border-box}
.letter h2{font-size:2.2rem;color:#00697a;font-family:Georgia,serif;margin-bottom:6px}
.letter-header{display:flex;justify-content:space-between;margin-bottom:20px;gap:20px}
.letter-co{font-size:.88rem;line-height:1.65}
.letter-ref{text-align:right;font-size:.82rem;line-height:1.8}
.letter-body p{font-size:.88rem;line-height:1.65;margin-bottom:10px}
.letter-details{background:#f5f5f2;border-radius:8px;padding:12px 16px;margin:14px 0;font-size:.82rem;line-height:1.9}
.letter-sigs{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:18px}
.sig-line{border-top:1px solid #333;padding-top:5px;font-size:.82rem}
.sig-block p{font-weight:600;margin-bottom:32px;font-size:.85rem}
/* RESPONSIVE */
@media(max-width:900px){.metrics{grid-template-columns:1fr 1fr}.kb-grid{grid-template-columns:1fr}}
@media(max-width:600px){.metrics{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="logo-row">
      <div class="logo-big">PE</div>
      <h1>Pezzano Induction Portal</h1>
      <p>Canning Vale &mdash; Warehouse Staff System</p>
    </div>
    <div class="login-card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('employee')">Employee</button>
        <button class="tab" onclick="switchTab('manager')">Manager / Admin</button>
      </div>
      <!-- EMPLOYEE -->
      <div class="panel active" id="panel-employee">
        <div class="field"><label>Employee Code</label><input id="emp-code" type="text" placeholder="e.g. EMP100421" autocomplete="username"/></div>
        <div class="field"><label>Password</label><input id="emp-pass" type="password" placeholder="Enter your password" autocomplete="current-password"/></div>
        <button class="login-btn" id="emp-btn" onclick="loginEmployee()">Sign In</button>
        <div class="msg" id="emp-msg"></div>
        <p class="hint">Your Employee Code was given to you by your manager.<br>Contact your manager if you forgot your password.</p>
      </div>
      <!-- MANAGER -->
      <div class="panel" id="panel-manager">
        <div class="field"><label>Work Email</label><input id="mgr-email" type="email" placeholder="your@email.com" autocomplete="email"/></div>
        <div class="field"><label>Password</label><input id="mgr-pass" type="password" placeholder="Enter your password" autocomplete="current-password"/></div>
        <button class="login-btn" id="mgr-btn" onclick="loginManager()">Sign In</button>
        <div class="msg" id="mgr-msg"></div>
      </div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="hidden">
  <header class="app-header">
    <div class="header-inner">
      <div class="brand">
        <div class="logo-sm">PE</div>
        <div><div class="brand-name">Pezzano Induction Portal</div><div class="brand-sub">Warehouse Staff System</div></div>
      </div>
      <div class="header-right">
        <div class="user-chip"><div class="user-dot"></div><span id="userLabel">Loading&hellip;</span></div>
        <button class="btn btn-ghost" onclick="doSignOut()">Sign Out</button>
      </div>
    </div>
  </header>
  <main class="page" id="app"></main>
  <div id="printArea" style="display:none"></div>
  <div id="toast"></div>
  <div id="modalRoot"></div>
</div>

// ── STATE ─────────────────────────────────────────────────────
let profile        = null;
let allEmployees   = [];
let moduleProgress = {};
let knowledgeViewed= [];
let view           = 'dashboard';
let activeModule   = 0;
let activeQuestion = 0;
let activeKbTopic  = 'welcome';
let filters        = {search:'',dept:'',status:'',position:''};

// ── HELPERS ───────────────────────────────────────────────────
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-AU'):'—';}
function isManager(p){return p&&['locationManager','sysAdmin'].includes(p.role);}
function isSysAdmin(p){return p&&p.role==='sysAdmin';}
function statusBadge(s){return s==='completed'?'badge-completed':s==='in_progress'?'badge-progress':'badge-pending';}
function fmtStatus(s){return s==='completed'?'Completed':s==='in_progress'?'In Progress':'Pending';}
function toast(msg,dur=2800){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';}
function setLoading(btnId,loading,label='Sign In'){const btn=document.getElementById(btnId);btn.disabled=loading;btn.innerHTML=loading?'<span class="spinner"></span>Signing in\u2026':label;}

// ── LOGIN ─────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(tab==='employee')));
  document.getElementById('panel-employee').classList.toggle('active',tab==='employee');
  document.getElementById('panel-manager').classList.toggle('active',tab==='manager');
}

async function loginEmployee(){
  const code=document.getElementById('emp-code').value.trim().toUpperCase();
  const pass=document.getElementById('emp-pass').value;
  if(!code||!pass){showMsg('emp-msg','Please enter your Employee Code and password.','error');return;}
  setLoading('emp-btn',true);
  try{
    // Step 1: Look up email from employee code
    const{data:emailData,error:rpcError}=await sb.rpc('get_email_by_employee_code',{p_code:code});
    if(rpcError){
      console.error('RPC error:',rpcError);
      showMsg('emp-msg','Could not look up employee code. Error: '+rpcError.message,'error');
      return;
    }
    if(!emailData){
      showMsg('emp-msg','Employee code not found. Please check your code or contact your manager.','error');
      return;
    }
    // Step 2: Sign in with the email and password
    const{data:signInData,error:signInErr}=await sb.auth.signInWithPassword({
      email:emailData,
      password:pass
    });
    if(signInErr){
      console.error('Sign in error:',signInErr);
      showMsg('emp-msg','Incorrect password. Please try again or ask your manager to reset it.','error');
      return;
    }
    await initApp();
  }catch(e){
    console.error('Login exception:',e);
    showMsg('emp-msg','Connection error. Please check your internet and try again.','error');
  }finally{
    setLoading('emp-btn',false);
  }
}

async function loginManager(){
  const email=document.getElementById('mgr-email').value.trim();
  const pass=document.getElementById('mgr-pass').value;
  if(!email||!pass){showMsg('mgr-msg','Please enter your email and password.','error');return;}
  setLoading('mgr-btn',true);
  try{
    const{error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showMsg('mgr-msg','Incorrect email or password. Please try again.','error');return;}
    await initApp();
  }catch(e){showMsg('mgr-msg','Connection error. Please try again.','error');}
  finally{setLoading('mgr-btn',false);}
}

document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('panel-employee').classList.contains('active'))loginEmployee();
  else loginManager();
});

// ── INIT APP ──────────────────────────────────────────────────
async function initApp(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){showLogin();return;}

  const{data:emp,error}=await sb.from('employees').select('*').eq('auth_id',session.user.id).single();
  if(error||!emp){await sb.auth.signOut();showLogin();return;}
  profile=emp;

  // Load module progress
  const{data:progRows}=await sb.from('module_progress').select('module_id,answers,completed').eq('employee_id',profile.id);
  moduleProgress={};
  if(progRows)progRows.forEach(r=>{moduleProgress[r.module_id]={answers:r.answers||{},completed:r.completed};});
  knowledgeViewed=profile.knowledge_viewed||[];

  if(isManager(profile)){
    const{data}=await sb.rpc('get_dashboard_data');
    allEmployees=data||[];
  }

  document.getElementById('userLabel').textContent=`${profile.full_name} · ${profile.employee_code}`;
  showApp();
  renderView();
}

function showLogin(){
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appScreen').classList.add('hidden');
}
function showApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
}

async function doSignOut(){
  await sb.auth.signOut();
  profile=null;allEmployees=[];moduleProgress={};knowledgeViewed=[];
  showLogin();
}

// ── AUTO-LOGIN if session exists ──────────────────────────────
(async()=>{
  const{data:{session}}=await sb.auth.getSession();
  if(session)await initApp();
})();

// ── RENDER ────────────────────────────────────────────────────
function renderView(){
  const app=document.getElementById('app');
  if(view==='dashboard')    app.innerHTML=renderDashboard();
  else if(view==='kb')      app.innerHTML=renderKnowledgeGate();
  else if(view==='module')  app.innerHTML=renderModule();
  else if(view==='decl')    app.innerHTML=renderDeclaration();
  else if(view==='done')    app.innerHTML=renderCompletion();
}

// ── EMPLOYEE DASHBOARD ────────────────────────────────────────

  if(isManager(profile))return renderManagerDashboard();
  const pct=profile.progress_pct||0;
  const done=MODULES.filter(m=>moduleProgress[m.id]?.completed).length;
  return`<div style="max-width:800px">
  <div class="card" style="margin-bottom:16px;background:linear-gradient(135deg,rgba(0,180,216,.08),transparent)">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div><div style="font-size:1.4rem;font-weight:700">Welcome, ${esc(profile.full_name)}</div>
      <div style="color:var(--muted);font-size:.83rem;margin-top:3px">${esc(profile.employee_code)} &middot; ${esc(profile.department)} &middot; ${esc(profile.position)}</div></div>
      <span class="badge ${statusBadge(profile.completion_status)}">${fmtStatus(profile.completion_status)}</span>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:6px"><span>Induction progress</span><strong style="color:var(--text)">${pct}% &middot; ${done}/${MODULES.length} modules</strong></div>
      <div style="height:8px;background:var(--surface3);border-radius:999px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--primary),var(--success));transition:.4s"></div></div>
    </div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-title">My Details</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;font-size:.83rem">
      ${[['Start Date',fmtDate(profile.start_date)],['Induction Date',fmtDate(profile.induction_date)],['Location',profile.work_location],['Department',profile.department],['Position',profile.position],['Employee Code',profile.employee_code]].map(([l,v])=>`<div><div style="color:var(--muted);font-size:.72rem;margin-bottom:2px">${l}</div><div style="font-weight:500">${esc(String(v||'—'))}</div></div>`).join('')}
    </div>
  </div>
  <div class="card">
    <div class="card-title">Induction</div>
    ${profile.completion_status==='completed'
      ?`<p style="color:var(--success);font-size:.9rem;margin-bottom:12px">&#10003; Induction complete. Your completion letter is ready.</p><button class="btn btn-success" onclick="printLetter()">Print Completion Letter</button>`
      :`<div style="display:flex;gap:8px;flex-wrap:wrap">
         <button class="btn btn-primary" onclick="resumeInduction()">${pct===0?'Start Induction':'Resume Induction'}</button>
         <button class="btn btn-ghost" onclick="view='kb';renderView()">Review Knowledge Topics</button>
       </div>`}
  </div></div>`;
}

// ── MANAGER DASHBOARD ─────────────────────────────────────────

  const completed=allEmployees.filter(e=>e.completion_status==='completed').length;

  const pct=total?Math.round(completed/total*100):0;
  return`
  <div class="metrics">
    <div class="metric card"><div class="val">${total}</div><div class="lbl">Total Staff</div></div>
    <div class="metric card"><div class="val" style="color:var(--primary)">${pct}%</div><div class="lbl">Overall Completion</div></div>
    <div class="metric card"><div class="val" style="color:var(--success)">${completed}</div><div class="lbl">Completed</div></div>
    <div class="metric card"><div class="val" style="color:var(--warning)">${inprog}</div><div class="lbl">In Progress</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div class="card-title" style="margin:0">Staff Tracking</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="exportExcel()">Export Excel</button>
        <button class="btn btn-warn" onclick="bulkPrint()">Bulk Print Letters</button>
        ${isSysAdmin(profile)?`<button class="btn btn-primary" onclick="openCreate()">+ Add Staff</button>`:''}

      </div>

      <select onchange="filters.dept=this.value;renderView()"><option value="">All departments</option>${DEPARTMENTS.map(d=>`<option value="${d}" ${filters.dept===d?'selected':''}>${d}</option>`).join('')}</select>
      <select onchange="filters.status=this.value;renderView()"><option value="">All status</option><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select>
      <select onchange="filters.position=this.value;renderView()"><option value="">All positions</option>${POSITIONS.map(p=>`<option value="${p}" ${filters.position===p?'selected':''}>${p}</option>`).join('')}</select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Code</th><th>Name</th><th>Dept</th><th>Position</th><th>Start Date</th><th>Status</th><th>Progress</th><th>Actions</th></tr></thead>
      <tbody>${rows.length?rows.map(e=>`<tr>
        <td style="font-family:monospace;font-size:.78rem">${esc(e.employee_code)}</td>
        <td><div style="font-weight:500">${esc(e.full_name)}</div><div style="font-size:.72rem;color:var(--muted)">${esc(e.phone||'')}</div></td>
        <td>${esc(e.department)}</td><td>${esc(e.position)}</td>
        <td style="font-size:.78rem">${fmtDate(e.start_date)}</td>
        <td><span class="badge ${statusBadge(e.completion_status)}">${fmtStatus(e.completion_status)}</span></td>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="prog-bar"><div class="prog-fill" style="width:${e.progress_pct}%"></div></div><span style="font-size:.75rem">${e.progress_pct}%</span></div></td>
        <td><div class="actions-cell">
          <button class="btn btn-ghost" onclick="viewDetail('${e.id}')">View</button>
          <button class="btn btn-ghost" onclick="changeDept('${e.id}')">Dept</button>
          ${isSysAdmin(profile)?`<button class="btn btn-warn" style="font-size:.75rem" onclick="openEdit('${e.id}')">&#9881; Edit</button>`:''}
          ${e.completion_status==='completed'?`<button class="btn btn-success" onclick="printLetterFor('${e.id}')">Letter</button>`:''}
          ${isSysAdmin(profile)?`<button class="btn btn-danger" style="font-size:.75rem" onclick="deleteEmp('${e.id}')">Del</button>`:''}
        </div></td>
      </tr>`).join(''):`<tr><td colspan="8" style="text-align:center;color:var(--muted);padding:32px">No records found.</td></tr>`}

function filteredEmployees(){
  return allEmployees.filter(e=>
    (!filters.search||[e.full_name,e.employee_code,e.phone||'',e.department,e.position].join(' ').toLowerCase().includes(filters.search.toLowerCase()))&&
    (!filters.dept||e.department===filters.dept)&&
    (!filters.status||e.completion_status===filters.status)&&
    (!filters.position||e.position===filters.position)
  );
}

// ── RESUME ────────────────────────────────────────────────────
function resumeInduction(){
  const allViewed=KNOWLEDGE_TOPICS.every(t=>knowledgeViewed.includes(t.id));
  if(!allViewed){view='kb';renderView();return;}
  const first=MODULES.findIndex(m=>!moduleProgress[m.id]?.completed);
  activeModule=first===-1?0:first;
  activeQuestion=0;view='module';renderView();
}

// ── KNOWLEDGE GATE ────────────────────────────────────────────
function renderKnowledgeGate(){
  const topic=KNOWLEDGE_TOPICS.find(t=>t.id===activeKbTopic)||KNOWLEDGE_TOPICS[0];
  const allDone=KNOWLEDGE_TOPICS.every(t=>knowledgeViewed.includes(t.id));
  return`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-ghost" onclick="view='dashboard';renderView()">&#8592; Back</button>
    <span style="font-size:.8rem;color:var(--muted)">${knowledgeViewed.length}/${KNOWLEDGE_TOPICS.length} topics confirmed</span>
    ${allDone?`<button class="btn btn-success" onclick="startModules()">&#128640; Start Induction Quiz</button>`:''}
  </div>
  <div class="kb-grid">
    <nav class="kb-nav">${KNOWLEDGE_TOPICS.map(t=>`<button class="kb-btn ${t.id===activeKbTopic?'active':''} ${knowledgeViewed.includes(t.id)?'done':''}" onclick="activeKbTopic='${t.id}';renderView()">${knowledgeViewed.includes(t.id)?'&#9989; ':''}${esc(t.title)}<div style="font-size:.7rem;opacity:.6;margin-top:2px">${esc(t.cat)}</div></button>`).join('')}</nav>
    <div class="card">
      <div style="font-size:1.05rem;font-weight:600;margin-bottom:4px">${esc(topic.title)}</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:14px">${esc(topic.summary)}</div>

async function confirmTopic(id){
  if(!knowledgeViewed.includes(id)){
    knowledgeViewed.push(id);
    await sb.from('employees').update({knowledge_viewed:knowledgeViewed}).eq('id',profile.id);
  }
  const next=KNOWLEDGE_TOPICS.find(t=>!knowledgeViewed.includes(t.id));
  if(next)activeKbTopic=next.id;
  renderView();
}
function startModules(){
  if(!KNOWLEDGE_TOPICS.every(t=>knowledgeViewed.includes(t.id))){alert('Please confirm all knowledge topics first.');return;}
  const first=MODULES.findIndex(m=>!moduleProgress[m.id]?.completed);
  activeModule=first===-1?0:first;activeQuestion=0;view='module';renderView();
}

// ── MODULE VIEW ───────────────────────────────────────────────
function renderModule(){
  const mod=MODULES[activeModule];
  const mp=moduleProgress[mod.id]||{answers:{},completed:false};
  const q=mod.questions[activeQuestion];
  const saved=mp.answers[activeQuestion];
  const completedSet=new Set(MODULES.filter(m=>moduleProgress[m.id]?.completed).map(m=>m.id));
  return`<div style="display:grid;grid-template-columns:200px 1fr;gap:16px;align-items:start">
    <aside>
      <div class="card" style="padding:14px">
        <div class="card-title">Modules</div>
        <div class="module-list">${MODULES.map((m,i)=>{const unlocked=i===0||completedSet.has(MODULES[i-1].id);const done=completedSet.has(m.id);return`<div class="mod-row ${i===activeModule?'active':''} ${done?'done':''} ${!unlocked?'locked':''}" onclick="${unlocked?`switchModule(${i})`:''}">${m.icon} ${esc(m.title)}${done?' <span style="margin-left:auto;font-size:.7rem;color:var(--success)">&#10003;</span>':''}</div>`;}).join('')}</div>
        <button class="btn btn-ghost" style="width:100%;margin-top:10px" onclick="view='dashboard';renderView()">&#8592; Dashboard</button>
      </div>
    </aside>
    <div style="display:grid;gap:14px">
      <div class="card" style="background:linear-gradient(135deg,rgba(0,180,216,.06),transparent)">
        <div style="font-size:.72rem;color:var(--muted);margin-bottom:4px">Module ${activeModule+1} of ${MODULES.length}</div>
        <div style="font-size:1.2rem;font-weight:600">${mod.icon} ${esc(mod.title)}</div>
      </div>
      <div class="card"><div class="card-title">Learning Points</div><ul style="padding-left:1rem;display:grid;gap:6px;font-size:.85rem;color:var(--muted)">${mod.content.map(c=>`<li>${esc(c)}</li>`).join('')}</ul></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;margin-bottom:14px"><div class="card-title" style="margin:0">Question ${activeQuestion+1} of ${mod.questions.length}</div><div style="font-size:.75rem;color:var(--muted)">${profile.progress_pct}% overall</div></div>
        <div class="q-text">${esc(q.q)}</div>
        <div class="options">${q.opts.map((opt,i)=>`<button type="button" class="opt ${saved!==undefined?(i===q.a?'correct':(i===saved?'wrong':'')):''}\" id="opt-${i}" ${saved!==undefined?'disabled':''} onclick="answerQ(${i})">${esc(opt)}</button>`).join('')}</div>
        <div id="feedback" class="feedback ${saved!==undefined?'show '+(saved===q.a?'good':'bad'):''}">${saved!==undefined?(saved===q.a?'&#10003; Correct.':'Saved. Review the explanation and try again.'):''}</div>
        <div id="explain" class="explain ${saved!==undefined?'show':''}">${saved!==undefined?esc(q.why):''}</div>
        <div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap">
          <button id="tryAgainBtn" class="btn btn-danger ${saved!==undefined&&saved!==q.a?'':'hidden'}" onclick="tryAgain()">Try Again</button>
          <button id="nextBtn" class="btn btn-primary ${saved===q.a?'':'hidden'}" onclick="nextQ()">${activeQuestion===mod.questions.length-1?'Finish Module':'Next Question'}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function switchModule(i){activeModule=i;activeQuestion=0;const saved=moduleProgress[MODULES[i].id];if(saved&&Object.keys(saved.answers).length){activeQuestion=Object.keys(saved.answers).length;if(activeQuestion>=MODULES[i].questions.length)activeQuestion=0;}view='module';renderView();}

async function answerQ(idx){
  const mod=MODULES[activeModule];const q=mod.questions[activeQuestion];
  if(!moduleProgress[mod.id])moduleProgress[mod.id]={answers:{},completed:false};
  moduleProgress[mod.id].answers[activeQuestion]=idx;
  await sb.rpc('save_module_progress',{p_module_id:mod.id,p_answers:moduleProgress[mod.id].answers,p_completed:false});
  const{data:upd}=await sb.from('employees').select('progress_pct').eq('id',profile.id).single();
  if(upd)profile.progress_pct=upd.progress_pct;
  document.querySelectorAll('.opt').forEach((el,i)=>{el.disabled=true;if(i===q.a)el.classList.add('correct');if(i===idx&&idx!==q.a)el.classList.add('wrong');});
  const fb=document.getElementById('feedback');const ex=document.getElementById('explain');
  fb.className='feedback show '+(idx===q.a?'good':'bad');
  fb.innerHTML=idx===q.a?'&#10003; Correct.':'Saved. Review the explanation and try again.';
  ex.className='explain show';ex.textContent=q.why;
  document.getElementById('nextBtn').classList.toggle('hidden',idx!==q.a);
  document.getElementById('tryAgainBtn').classList.toggle('hidden',idx===q.a);
}

function tryAgain(){const mod=MODULES[activeModule];if(moduleProgress[mod.id])delete moduleProgress[mod.id].answers[activeQuestion];renderView();}

async function nextQ(){
  const mod=MODULES[activeModule];
  if(activeQuestion<mod.questions.length-1){activeQuestion++;renderView();return;}
  const mp=moduleProgress[mod.id]||{answers:{},completed:false};
  const allCorrect=mod.questions.every((q,i)=>mp.answers[i]===q.a);
  if(!allCorrect){const first=mod.questions.findIndex((q,i)=>mp.answers[i]!==q.a);activeQuestion=first>=0?first:0;alert('Please answer all questions correctly to complete this module. Returning to the first unanswered question.');renderView();return;}
  mp.completed=true;
  await sb.rpc('save_module_progress',{p_module_id:mod.id,p_answers:mp.answers,p_completed:true});
  const{data:upd}=await sb.from('employees').select('progress_pct,completion_status').eq('id',profile.id).single();
  if(upd){profile.progress_pct=upd.progress_pct;profile.completion_status=upd.completion_status;}
  toast(`&#10003; Module "${mod.title}" completed!`);
  if(activeModule<MODULES.length-1){activeModule++;activeQuestion=0;renderView();}
  else{view='decl';renderView();}
}

function printLetter(){printLetterFor(profile.id);}
function printLetterFor(id){
  const emp=id===profile.id?profile:allEmployees.find(e=>e.id===id);
  if(!emp||emp.completion_status!=='completed'){alert('Completion letter only available after full completion.');return;}
  const area=document.getElementById('printArea');area.style.display='block';area.innerHTML=buildLetter(emp);window.print();area.style.display='none';
}
function bulkPrint(){
  const done=filteredEmployees().filter(e=>e.completion_status==='completed');
  if(!done.length){alert('No completed staff in current filter.');return;}
  const area=document.getElementById('printArea');area.style.display='block';area.innerHTML=done.map(buildLetter).join('<div style="page-break-after:always"></div>');window.print();area.style.display='none';
}

  ${(data||[]).length===0?'<p style="color:var(--muted)">No entries yet.</p>':(data||[]).map(e=>`<div style="padding:10px 0;border-bottom:1px solid var(--border);font-size:.82rem">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><span style="color:var(--primary);font-weight:600">${esc(e.actor_name||'System')}</span><span style="color:var(--faint);font-size:.72rem">${new Date(e.created_at).toLocaleString('en-AU')}</span></div>
    <div style="margin-top:2px">${esc(e.action)}</div><div style="color:var(--muted);font-size:.78rem">${esc(e.detail||'')}</div>
  </div>`).join('')}
  <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Close</button></div>
  </div></div>`;
}
</script>
</body>
</html>
