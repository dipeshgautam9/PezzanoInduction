<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Password Recovery</title>
<style>
:root{--bg:#f7f6f2;--surface:#fff;--text:#1f1f1f;--muted:#666;--primary:#01696f;--border:#d7d3cc;--radius:14px;--shadow:0 8px 28px rgba(0,0,0,.08);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text)}.card{width:min(560px,92vw);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}h1{margin:0 0 8px;font-size:28px}p{margin:0 0 18px;color:var(--muted);line-height:1.5}.row{display:grid;gap:12px}.field{display:grid;gap:6px}label{font-size:14px;font-weight:600}input,button{font:inherit;border-radius:12px;padding:14px 16px}input{border:1px solid var(--border)}button{border:0;background:var(--primary);color:#fff;font-weight:700;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}.msg{margin-top:14px;font-size:14px}.ok{color:green}.err{color:#b00020}</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main class="card">
    <h1>Set a new password</h1>
    <p>Use this page from your password reset email to finish the recovery flow.</p>
    <form id="reset-form" class="row">
      <div class="field">
        <label for="password">New password</label>
        <input id="password" type="password" minlength="8" required>
      </div>
      <div class="field">
        <label for="confirm">Confirm new password</label>
        <input id="confirm" type="password" minlength="8" required>
      </div>
      <button id="submit" type="submit">Update password</button>
    </form>
    <div id="message" class="msg"></div>
  </main>
<script>
const SUPABASE_URL='https://jookdsjvbticdgvxagyt.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_1emkeuRvXdsF6S-yyxcUeQ_BdUBJ5PF';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{detectSessionInUrl:true,persistSession:true,autoRefreshToken:true}});
const msg=(t,c='')=>{const m=document.getElementById('message');m.className='msg '+c;m.textContent=t};
(async()=>{const {data}=await sb.auth.getSession(); if(!data.session){msg('Open this page from the recovery email link.','err'); document.getElementById('submit').disabled=true;}})();
document.getElementById('reset-form').addEventListener('submit', async e=>{e.preventDefault(); const p=document.getElementById('password').value; const c=document.getElementById('confirm').value; if(p!==c) return msg('Passwords do not match.','err'); const {data,error}=await sb.auth.updateUser({password:p}); if(error) return msg(error.message,'err'); msg('Password updated. Go back to login and sign in again.','ok'); setTimeout(()=>location.href='login.html',1500);});
</script>
</body>
</html>
